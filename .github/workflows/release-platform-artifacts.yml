name: Release TV Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to dispatch to private platform repos
        required: true
      release_id:
        description: Existing GitHub release ID
        required: false
      rebuild_webos:
        description: Rebuild webOS wrapper instead of reusing previous IPK
        required: false
        default: "true"

jobs:
  resolve-release-payload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.payload.outputs.tag }}
      release_id: ${{ steps.payload.outputs.release_id }}
      rebuild_webos: ${{ steps.payload.outputs.rebuild_webos }}
    steps:
      - name: Resolve release payload
        id: payload
        env:
          RELEASE_BODY: ${{ github.event.release.body || '' }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "release_id=${{ github.event.release.id }}" >> "$GITHUB_OUTPUT"
            if printf '%s' "$RELEASE_BODY" | grep -qi '\[reuse-webos-ipk\]'; then
              echo "rebuild_webos=false" >> "$GITHUB_OUTPUT"
            else
              echo "rebuild_webos=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "release_id=${{ inputs.release_id }}" >> "$GITHUB_OUTPUT"
            echo "rebuild_webos=${{ inputs.rebuild_webos || 'true' }}" >> "$GITHUB_OUTPUT"
          fi

  dispatch-webos-build:
    runs-on: ubuntu-latest
    needs: resolve-release-payload
    permissions:
      contents: read
    steps:
      - name: Dispatch webOS build
        if: ${{ vars.WEBOS_REPO != '' }}
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
          TARGET_REPO: ${{ vars.WEBOS_REPO }}
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
          RELEASE_ID: ${{ needs.resolve-release-payload.outputs.release_id }}
          REBUILD_WEBOS: ${{ needs.resolve-release-payload.outputs.rebuild_webos }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          gh api --method POST "repos/$TARGET_REPO/dispatches" \
            -f event_type=build-release \
            -F client_payload[source_repo]="$SOURCE_REPO" \
            -F client_payload[tag]="$TAG_NAME" \
            -F client_payload[release_id]="$RELEASE_ID" \
            -F client_payload[rebuild_webos]="$REBUILD_WEBOS"

  update-tizen-version:
    runs-on: ubuntu-latest
    needs: resolve-release-payload
    permissions:
      contents: read
    steps:
      - name: Check out Tizen wrapper repo
        if: ${{ vars.TIZEN_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TIZEN_REPO }}
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Update Tizen wrapper version
        if: ${{ vars.TIZEN_REPO != '' }}
        env:
          RELEASE_TAG: ${{ needs.resolve-release-payload.outputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          VERSION="$VERSION" node -e "const fs=require('fs');const file='package.json';const data=JSON.parse(fs.readFileSync(file,'utf8'));data.version=process.env.VERSION;fs.writeFileSync(file, JSON.stringify(data, null, 2)+'\n');"

      - name: Commit Tizen wrapper version bump
        if: ${{ vars.TIZEN_REPO != '' }}
        env:
          RELEASE_TAG: ${{ needs.resolve-release-payload.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          if git diff --cached --quiet; then
            echo "No Tizen version changes to commit"
            exit 0
          fi
          git commit -m "Update Tizen wrapper version for ${RELEASE_TAG}"
          git push origin HEAD:main
